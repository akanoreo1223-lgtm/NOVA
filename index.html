<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ノート管理アプリ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #FFE4B5;
            font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
            font-size: 1.3em;
        }

        header {
            background: #FFB347;
            padding: 20px;
            text-align: center;
            color: #fff;
            font-size: 1.4em;
            font-weight: bold;
        }

        section {
            padding: 20px;
            margin: 20px;
            background: #fff8ee;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            min-height: 90vh;
        }

        h2 {
            margin-top: 0;
            color: #d46a00;
        }

        button {
            background: #ff9a3c;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 1em;
        }

        button:hover {
            background: #ff7f00;
        }

        input {
            padding: 10px;
            border: 1px solid #d8a56a;
            border-radius: 6px;
            width: 60%;
            margin-right: 8px;
            font-size: 1em;
        }

        #note-editor {
            width: 100%;
            height: 600px;
            padding: 12px;
            border: 1px solid #d8a56a;
            border-radius: 8px;
            background: #fffdf8;
            font-size: 1em;
            line-height: 1.6;
        }

        .item {
            padding: 16px;
            background: #fff;
            border: 1px solid #e0c7a8;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item button {
            margin-left: 6px;
        }
    </style>
</head>

<body>

<header>
    ノート管理アプリ
</header>

<main>

    <!-- ① ジャンル一覧 -->
    <section id="genre-section">
        <h2>ジャンル</h2>

        <div id="genre-list"></div>

        <div class="input-area">
            <input id="new-genre-name" type="text" placeholder="新しいジャンル名">
            <button id="add-genre-btn">追加</button>
        </div>
    </section>

    <!-- ② ファイル一覧 -->
    <section id="file-section" style="display:none;">
        <h2 id="file-title">ファイル</h2>

        <div id="file-list"></div>

        <div class="input-area">
            <input id="new-file-name" type="text" placeholder="新しいファイル名">

            <!-- ロックON/OFF -->
            <label>
                <input type="checkbox" id="lock-file-check">
                ロックする
            </label>

            <!-- パスワード入力欄 -->
            <input id="new-file-pass" type="password" placeholder="パスワード（任意）" style="display:none;">

            <button id="add-file-btn">追加</button>
        </div>

        <button id="back-to-genre">← ジャンルに戻る</button>
    </section>

    <!-- ③ ノート一覧 -->
    <section id="note-section" style="display:none;">
        <h2 id="note-title">ノート</h2>

        <div id="note-list"></div>

        <div class="input-area">
            <input id="new-note-title" type="text" placeholder="新しいノートのタイトル">
            <button id="add-note-btn">追加</button>
        </div>

        <button id="back-to-file">← ファイルに戻る</button>
    </section>

    <!-- ④ ノート編集 -->
    <section id="editor-section" style="display:none;">
        <h2 id="editor-title">ノート編集</h2>

        <textarea id="note-editor"></textarea>

        <button id="save-note-btn">保存</button>
        <button id="back-to-notes">← ノート一覧に戻る</button>
    </section>

</main>

<script>
let data = JSON.parse(localStorage.getItem("noteAppData") || "{}");

function saveData() {
    localStorage.setItem("noteAppData", JSON.stringify(data));
}

let currentGenre = null;
let currentFile = null;
let currentNote = null;

/* ① ジャンル表示 */
/* ② ファイル表示 */
function renderFiles() {
    const list = document.getElementById("file-list");
    list.innerHTML = "";

    const files = data[currentGenre];

    for (let file in files) {
        const isLocked = files[file]._lock === true;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${file} ${isLocked ? "🔒" : ""}</span>
            <div>
                <button onclick="openFile('${file}')">開く</button>
                <button onclick="deleteFile('${file}')">削除</button>
            </div>
        `;
        list.appendChild(div);
    }
}

document.getElementById("lock-file-check").onchange = () => {
    document.getElementById("new-file-pass").style.display =
        document.getElementById("lock-file-check").checked ? "inline-block" : "none";
};

document.getElementById("add-file-btn").onclick = () => {
    const name = document.getElementById("new-file-name").value.trim();
    if (!name) return;

    const lock = document.getElementById("lock-file-check").checked;
    const pass = document.getElementById("new-file-pass").value;

    if (!data[currentGenre][name]) {
        data[currentGenre][name] = {};

        if (lock) {
            data[currentGenre][name]._lock = true;
            data[currentGenre][name]._pass = pass;
        }
    }

    saveData();
    renderFiles();

    document.getElementById("new-file-name").value = "";
    document.getElementById("new-file-pass").value = "";
    document.getElementById("lock-file-check").checked = false;
    document.getElementById("new-file-pass").style.display = "none";
};

function deleteFile(name) {
    delete data[currentGenre][name];
    saveData();
    renderFiles();
}

function openFile(name) {
    const file = data[currentGenre][name];

    if (file._lock === true) {
        const input = prompt("パスワードを入力してください");

        if (input !== file._pass) {
            alert("パスワードが違います");
            return;
        }
    }

    currentFile = name;
    document.getElementById("file-section").style.display = "none";
    document.getElementById("note-section").style.display = "block";
    renderNotes();
}

document.getElementById("back-to-genre").onclick = () => {
    document.getElementById("file-section").style.display = "none";
    document.getElementById("genre-section").style.display = "block";
};

/* ③ ノート表示 */
function renderNotes() {
    const list = document.getElementById("note-list");
    list.innerHTML = "";

    const notes = data[currentGenre][currentFile];

    for (let note in notes) {
        if (note.startsWith("_")) continue;
/* ④ ノート編集 */
document.getElementById("save-note-btn").onclick = () => {
    const text = document.getElementById("note-editor").value;
    data[currentGenre][currentFile][currentNote] = text;
    saveData();
};

document.getElementById("back-to-notes").onclick = () => {
    document.getElementById("editor-section").style.display = "none";
    document.getElementById("note-section").style.display = "block";
};

renderGenres();
</script>

</body>
</html>
